---
# Example playbook for provisioning multiple VMs from inventory
# VMs are defined in host_vars/kvm-host-01.yml

- name: Provision multiple VMs from inventory
  hosts: hypervisors
  become: true

  tasks:
    - name: Validate vms_to_provision is defined
      ansible.builtin.assert:
        that:
          - vms_to_provision is defined
          - vms_to_provision | length > 0
        fail_msg: "No VMs defined in vms_to_provision variable"
        success_msg: "Found {{ vms_to_provision | length }} VM(s) to provision"

    - name: Provision each VM
      ansible.builtin.include_role:
        name: kvm_vm
      vars:
        vm_name: "{{ item.name }}"
        vm_memory_mb: "{{ item.memory_mb }}"
        vm_vcpus: "{{ item.vcpus }}"
        vm_disk_size: "{{ item.disk_size }}"
        use_dhcp: "{{ item.use_dhcp | default(true) }}"
        vm_ip: "{{ item.ip | default('') }}"
        vm_prefix: "{{ item.prefix | default(24) }}"
        vm_gateway: "{{ item.gateway | default('') }}"
        vm_dns_servers: "{{ item.dns_servers | default(['8.8.8.8', '8.8.4.4']) }}"
        vm_ssh_public_key: "{{ item.ssh_key }}"
        autostart: "{{ item.autostart | default(false) }}"
      loop: "{{ vms_to_provision }}"
      loop_control:
        label: "{{ item.name }}"
