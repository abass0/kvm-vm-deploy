---
# defaults file for kvm_vm

# VM identification
vm_name: rhel9-vm
vm_hostname: "{{ vm_name }}"
vm_domain: lab.local

# VM resources
vm_memory_mb: 2048
vm_vcpus: 2
vm_disk_size: 20G

# Source image
vm_image: /var/lib/libvirt/images/templates/rhel9-golden.qcow2

# Network configuration
vm_network: default
use_dhcp: true
vm_ip: ""
vm_prefix: 24
vm_gateway: ""
vm_dns_servers:
  - 8.8.8.8
  - 8.8.4.4

# User configuration
vm_user: ansible
vm_ssh_public_key: ""

# VM behavior
autostart: false

# Internal paths (do not override unless necessary)
vm_disk_path: "/var/lib/libvirt/images/instances/{{ vm_name }}.qcow2"
vm_cloud_init_dir: "/var/lib/libvirt/cloud-init/{{ vm_name }}"
vm_cloud_init_iso: "/var/lib/libvirt/cloud-init/{{ vm_name }}.iso"
